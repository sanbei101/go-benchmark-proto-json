name: Redis vs Valkey
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/redis-vs-valkey.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install benchmark tools
        run: |
          wget https://github.com/redis/memtier_benchmark/releases/download/2.3.0/memtier-benchmark_2.3.0.noble_amd64.deb
          sudo apt install ./memtier-benchmark_2.3.0.noble_amd64.deb
          
      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Pull latest images
        run: |
          docker pull redis:latest
          docker pull valkey/valkey:latest

      - name: Start Redis and Valkey
        run: |
          docker network create bench-net || true
          docker rm -f redis-bench valkey-bench || true

          docker run -d --name redis-bench \
            --network bench-net \
            -p 6379:6379 \
            redis:latest \
            redis-server --save '' --appendonly no

          docker run -d --name valkey-bench \
            --network bench-net \
            -p 6380:6379 \
            valkey/valkey:latest \
            valkey-server --save '' --appendonly no

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if docker exec redis-bench redis-cli ping && docker exec valkey-bench valkey-cli ping; then
              exit 0
            fi
            sleep 1
          done
          echo "Redis or Valkey is not ready in time"
          exit 1

      - name: Benchmark Redis
        run: |
          mkdir -p benchmark-results
          memtier_benchmark \
            --server=127.0.0.1 --port=6379 --protocol=redis \
            --threads=4 --clients=50 --requests=10000 \
            --data-size=256 --ratio=1:10 --pipeline=16 \
            --hide-histogram | tee benchmark-results/redis.txt

          for i in $(seq 1 1000); do
            redis-cli -p 6379 XGROUP CREATE stream:$i g1 $ MKSTREAM
          done

          memtier_benchmark \
            --server=127.0.0.1 --port=6379 --protocol=redis \
            --threads=4 --clients=50 --requests=10000 \
            --key-minimum=1 --key-maximum=1000 \
            --command="XADD stream:__key__ * field1 __data__"   --command-ratio=1 \
            --command="XREADGROUP GROUP g1 c1 COUNT 1000 STREAMS stream:__key__ >" --command-ratio=5 \
            --hide-histogram | tee benchmark-results/redis-stream.txt
          

      - name: Benchmark Valkey
        run: |
          memtier_benchmark \
            --server=127.0.0.1 --port=6380 --protocol=redis \
            --threads=4 --clients=50 --requests=10000 \
            --data-size=256 --ratio=1:10 --pipeline=16 \
            --hide-histogram | tee benchmark-results/valkey.txt

          for i in $(seq 1 1000); do
            redis-cli -p 6380 XGROUP CREATE stream:$i g1 $ MKSTREAM
          done

          memtier_benchmark \
            --server=127.0.0.1 --port=6380 --protocol=redis \
            --threads=4 --clients=50 --requests=10000 \
            --key-minimum=1 --key-maximum=1000 \
            --command="XADD stream:__key__ * field1 __data__"   --command-ratio=1 \
            --command="XREADGROUP GROUP g1 c1 COUNT 1000 STREAMS stream:__key__ >" --command-ratio=5 \
            --hide-histogram | tee benchmark-results/valkey-stream.txt

      - name: Show Redis results
        run: |
          echo "## Redis Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/redis.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Redis Stream Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/redis-stream.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Show Valkey results
        run: |
          echo "## Valkey Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/valkey.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Valkey Stream Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/valkey-stream.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker rm -f redis-bench valkey-bench || true
          docker network rm bench-net || true