name: Redis测试
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/redis.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install benchmark tools
        run: |
          wget https://github.com/redis/memtier_benchmark/releases/download/2.3.0/memtier-benchmark_2.3.0.noble_amd64.deb
          sudo apt install ./memtier-benchmark_2.3.0.noble_amd64.deb
        
      - name: Pull latest images
        run: |
          docker pull redis:latest

      - name: Start Redis and Valkey
        run: |
          docker network create bench-net || true
          docker rm -f redis-bench || true

          docker run -d --name redis-bench \
            --network bench-net \
            -p 6379:6379 \
            redis:latest \
            redis-server --save '' --appendonly no

      - name: Wait for services
        run: |
          for i in $(seq 1 10); do
            if docker exec redis-bench redis-cli ping; then
              exit 0
            fi
            sleep 1
          done
          echo "Redis is not ready in time"
          exit 1

      - name: Benchmark Redis
        run: |
          mkdir -p benchmark-results
          memtier_benchmark \
            --server=127.0.0.1 --port=6379 --protocol=redis \
            --threads=4 --clients=1 --requests=10000 \
            --data-size=256 --ratio=1:10 --pipeline=16 \
            --hide-histogram | tee benchmark-results/redis.txt

          docker exec redis-bench redis-cli XGROUP CREATE stream:test g1 '$' MKSTREAM

          memtier_benchmark \
            --server=127.0.0.1 --port=6379 --protocol=redis \
            --threads=4 --clients=1 --requests=100000 \
            --pipeline=1000 \
            --command="XADD stream:test * field1 __data__" \
            --command-ratio=1 \
            --command="XREADGROUP GROUP g1 c__thread_id__ COUNT 1000 STREAMS stream:test >" \
            --command-ratio=5 \
            --hide-histogram | tee benchmark-results/redis-stream.txt
            
          for i in {1..16}; do
            docker exec redis-bench redis-cli XGROUP CREATE stream:test$i g1 '$' MKSTREAM
          done

          memtier_benchmark \
              --server=127.0.0.1 --port=6379 --protocol=redis \
              --threads=4 --clients=1 --requests=100000 \
              --pipeline=1000 \
              --key-prefix="stream:test" \
              --key-minimum=1 --key-maximum=16 \
              --command="XADD __key__ * field1 __data__" \
              --command-ratio=1 \
              --command="XREADGROUP GROUP g1 c__thread_id__ COUNT 1000 STREAMS __key__ >" \
              --command-ratio=5 \
              --hide-histogram | tee benchmark-results/redis-16-streams.txt
          
      - name: Show Redis results
        run: |
          echo "## Redis Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/redis.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Redis Stream Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/redis-stream.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Redis 16 Streams Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results/redis-16-streams.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker rm -f redis-bench || true
          docker network rm bench-net || true