syntax = "proto3";

package chat;

option go_package = "./model";

message ProtoChatMessage {
  bytes msg_id = 1;
  bytes client_msg_id = 2;
  bytes sender_id = 3;
  bytes room_id = 4;

  int64 server_time = 6;
  optional bytes reply_to_msg_id = 7;

  string msg_type = 8;
  bytes payload = 9;
  bytes ext = 10;
}
